name: preview-validation

on:
  push:
    branches:
      - main
      - auto-builder/frontend-system-port-20260607
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-frontend-system-port:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build
