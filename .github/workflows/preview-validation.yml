name: preview-validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-factory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate factory install
        run: npm run validate:factory

      - name: Build Next.js app
        run: npm run build
