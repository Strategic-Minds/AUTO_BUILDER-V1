name: Sentinel CI Guard

on:
  push:
    branches:
      - main
      - 'feature/sentinel*'
      - 'fix/sentinel*'
  pull_request:
    branches:
      - main

jobs:
  sentinel-guard:
    name: Sentinel Structural + Security Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Structure check: no top-level /app directory ───────────────────────
      - name: Verify no top-level /app directory (Next.js must live in /src/app)
        run: |
          if [ -d "app" ] && [ ! -f "app/.gitkeep" ]; then
            echo "❌ SENTINEL GUARD FAILED: top-level /app directory detected."
            echo "   All Next.js source MUST live in /src/app — not /app."
            echo "   This drift breaks the AUTO_BUILDER sentinel detection."
            exit 1
          fi
          echo "✅ No top-level /app directory drift detected."

      # ── Sentinel route presence ────────────────────────────────────────────
      - name: Verify sentinel route exists
        run: |
          SENTINEL_PATH="src/app/api/sentinel/[...path]/route.ts"
          if [ -f "$SENTINEL_PATH" ]; then
            echo "✅ Sentinel catch-all route present: $SENTINEL_PATH"
          else
            echo "⚠️  Sentinel route missing at $SENTINEL_PATH"
            echo "   Scoring will be unavailable until sentinel route is deployed."
            exit 1
          fi

      # ── MCP route presence ─────────────────────────────────────────────────
      - name: Verify MCP route exists
        run: |
          if [ -f "src/app/api/mcp/route.ts" ]; then
            echo "✅ MCP route present"
          else
            echo "⚠️  MCP route not found at src/app/api/mcp/route.ts"
          fi

      # ── Secret pattern scan (no hardcoded credentials) ────────────────────
      - name: Scan for hardcoded secrets (Twilio, Supabase, GitHub, OpenAI)
        run: |
          FAIL=0
          patterns=(
            "ACd87b3d"
            "7e73b0fa62"
            "SK5f41f7ef"
            "sk-proj-"
            "sk-ant-"
            "prhppuuwcnmfdhwsagug"
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
          )
          for pattern in "${patterns[@]}"; do
            matches=$(grep -r "$pattern" src/ --include="*.ts" --include="*.tsx" --include="*.js" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "❌ SENTINEL GUARD: Hardcoded secret pattern detected: $pattern"
              echo "$matches"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "✅ No hardcoded secrets detected in src/"

      # ── TypeScript compile check (no tsc errors) ──────────────────────────
      - name: TypeScript strict check
        run: |
          if [ -f "package.json" ]; then
            npm ci --prefer-offline --silent 2>/dev/null || npm install --silent 2>/dev/null || true
            npx tsc --noEmit 2>&1 | tail -20 || true
            echo "✅ TypeScript check complete (warnings above if any)"
          fi

      # ── productionMutated: false assertion ────────────────────────────────
      - name: Assert productionMutated is always false in sentinel code
        run: |
          if grep -r "productionMutated: true" src/lib/sentinel/ src/app/api/sentinel/ 2>/dev/null; then
            echo "❌ SENTINEL GUARD: productionMutated: true found in sentinel code — BLOCKED"
            exit 1
          fi
          echo "✅ productionMutated: false enforced throughout sentinel layer"

      # ── All checks passed ─────────────────────────────────────────────────
      - name: Sentinel guard passed
        run: |
          echo "✅ ALL SENTINEL CI GUARDS PASSED"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"
          echo "   Safe to proceed to Vercel preview."
