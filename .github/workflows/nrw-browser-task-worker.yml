name: NRW Browser Task Worker

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Optional browser_tasks.id to process
        required: false
        type: string
      qa_email:
        description: Optional QA email override for the live lead-form test
        required: false
        type: string
      target_url:
        description: Optional NRW target URL override
        required: false
        type: string
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

env:
  BROWSER_WORKER_NAME: github_actions_playwright_nrw_worker
  NRW_BROWSER_TASK_STATES: queued,claimed,blocked

jobs:
  process-nrw-browser-task:
    name: Process NRW browser task
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium with system dependencies
        run: npx playwright install --with-deps chromium

      - name: Process browser task
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NRW_BROWSER_TASK_ID: ${{ inputs.task_id }}
          NRW_QA_EMAIL: ${{ inputs.qa_email }}
          NRW_TARGET_URL: ${{ inputs.target_url }}
        run: node scripts/nrw-browser-task-worker.mjs
