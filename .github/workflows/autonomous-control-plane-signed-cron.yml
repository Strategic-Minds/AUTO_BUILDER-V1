name: Autonomous Control Plane Signed Cron

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/autonomous-control-plane-signed-cron.yml"
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  TARGET_URL: https://auto-builder-strategic-minds-advisory.vercel.app
  CRON_PATH: /api/cron/autonomous-control-plane

jobs:
  signed-cron:
    name: signed-control-plane-cron
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Call signed autonomous control plane cron
        env:
          AUTONOMOUS_CONTROL_PLANE_CRON_SECRET: ${{ secrets.AUTONOMOUS_CONTROL_PLANE_CRON_SECRET }}
        run: |
          node <<'NODE'
          const { createHmac } = await import('node:crypto');
          const { writeFileSync } = await import('node:fs');

          const secret = process.env.AUTONOMOUS_CONTROL_PLANE_CRON_SECRET;
          if (!secret) {
            throw new Error('Missing AUTONOMOUS_CONTROL_PLANE_CRON_SECRET GitHub secret.');
          }

          const base = process.env.TARGET_URL.replace(/\/$/, '');
          const path = process.env.CRON_PATH;
          const timestamp = new Date().toISOString();
          const payload = `${path}:${timestamp}`;
          const signature = createHmac('sha256', secret).update(payload).digest('hex');

          const response = await fetch(`${base}${path}`, {
            headers: {
              'x-awos-timestamp': timestamp,
              'x-awos-signature': signature,
              'user-agent': 'awos-signed-cron/1.0'
            }
          });

          const text = await response.text();
          let body;
          try {
            body = JSON.parse(text);
          } catch {
            body = { raw: text.slice(0, 1000) };
          }

          const verificationStatus = body?.verification?.status ?? 'unknown';
          const persistenceStatus = body?.persistence?.status ?? 'unknown';
          const receipt = {
            target: base,
            path,
            status: response.status,
            ok:
              response.ok &&
              verificationStatus === 'verified' &&
              persistenceStatus === 'persisted' &&
              body?.productionActionAllowed === false,
            verificationStatus,
            persistence: {
              status: persistenceStatus,
              receiptId: body?.persistence?.receiptId ?? body?.receipt?.receiptId ?? null,
              table: body?.persistence?.table ?? 'public.autobuilder_run_receipts'
            },
            productionActionAllowed: body?.productionActionAllowed,
            checkedAt: timestamp,
            receiptId: body?.receipt?.receiptId ?? body?.persistence?.receiptId ?? null,
            response: body
          };

          writeFileSync('signed-cron-verification.json', JSON.stringify(receipt, null, 2));

          if (!receipt.ok) {
            throw new Error(`Signed cron verification failed: ${JSON.stringify(receipt)}`);
          }
          NODE

      - name: Upload signed cron verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signed-cron-verification
          path: signed-cron-verification.json
          if-no-files-found: error
