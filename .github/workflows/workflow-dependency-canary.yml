name: workflow-dependency-canary

on:
  push:
    branches:
      - auto-builder/frontend-system-port-20260607
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  workflow-runtime-canary:
    name: workflow@${{ matrix.workflow-version }} runtime canary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workflow-version:
          - "3"
          - "latest"
          - "2.0.6"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install workflow canary version without saving
        run: npm install workflow@${{ matrix.workflow-version }} --no-save

      - name: Show resolved workflow package
        run: npm ls workflow --depth=0

      - name: Verify workflow API import
        run: node -e "import('workflow/api').then((m) => { if (typeof m.start !== 'function') throw new Error('workflow/api start export missing'); console.log('workflow/api start export verified'); })"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build

      - name: Audit dependencies with canary version
        run: node scripts/audit-dependencies.mjs
