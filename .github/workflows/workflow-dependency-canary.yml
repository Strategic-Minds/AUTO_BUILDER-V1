name: workflow-dependency-canary

on:
  push:
    branches:
      - auto-builder/frontend-system-port-20260607
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  internal-runtime-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Verify workflow package is absent
        run: node -e "const packageJson = require('./package.json'); if (packageJson.dependencies && packageJson.dependencies.workflow) throw new Error('workflow dependency still present'); console.log('workflow dependency absent from package.json');"

      - name: Verify workflow API imports are removed
        run: node -e "const { readFileSync } = require('node:fs'); const paths = ['src/app/api/cron/recursive-control/route.ts', 'src/app/api/workflows/awos-recursive-control/route.ts', 'next.config.js', 'next.config.mjs']; for (const path of paths) { const text = readFileSync(path, 'utf8'); if (text.includes('workflow/api') || text.includes('workflow/next')) throw new Error(`${path} still imports workflow package runtime`); } console.log('workflow package runtime imports removed');"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build

      - name: Audit dependencies after internal runtime replacement
        run: node scripts/audit-dependencies.mjs
