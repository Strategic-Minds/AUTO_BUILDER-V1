name: workflow-dependency-canary

on:
  push:
    branches:
      - auto-builder/frontend-system-port-20260607
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  workflow-206-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install audit-suggested workflow version without saving
        run: npm install workflow@2.0.6 --no-save

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build

      - name: Audit dependencies with canary version
        run: node scripts/audit-dependencies.mjs
