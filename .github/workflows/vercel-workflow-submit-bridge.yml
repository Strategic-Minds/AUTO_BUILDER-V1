name: Vercel Workflow Submit Bridge

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Optional Vercel factory intake URL override
        required: false
        default: ""
      dry_run:
        description: Validate packet without posting
        required: false
        default: "false"
  pull_request:
    branches:
      - main
      - master
    paths:
      - factory/workflow-submissions/master-system-completion-vercel-workflow-20260607.json
      - scripts/submit-vercel-workflow-bridge.mjs
      - .github/workflows/vercel-workflow-submit-bridge.yml

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  SUBMISSION_PACKET: factory/workflow-submissions/master-system-completion-vercel-workflow-20260607.json
  RECEIPT_DIR: workflow-receipts

concurrency:
  group: vercel-workflow-submit-bridge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    name: Submit master packet to Vercel factory intake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VERCEL_WORKFLOW_INTAKE_URL: ${{ github.event.inputs.target_url || 'https://auto-builder-git-auto-builder-u-bdac7f-strategic-minds-advisory.vercel.app/api/factory/build-packet' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Submit packet
        run: node scripts/submit-vercel-workflow-bridge.mjs

      - name: Upload receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-workflow-submit-bridge-receipt
          path: workflow-receipts/vercel-workflow-submit-bridge.json
          if-no-files-found: error
