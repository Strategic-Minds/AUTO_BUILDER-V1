{
  "name": "AUTO_BUILDER Master Validate",
  "on": {
    "pull_request": {
      "branches": [
        "main",
        "develop"
      ]
    },
    "workflow_dispatch": {}
  },
  "jobs": {
    "validate": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "uses": "actions/setup-node@v4",
          "with": {
            "node-version": "20"
          }
        },
        {
          "run": "npm ci"
        },
        {
          "run": "npm run lint"
        },
        {
          "run": "npm run typecheck"
        },
        {
          "run": "npm run validate:hardening"
        },
        {
          "run": "npm run validate:package-loop"
        },
        {
          "run": "npm run build"
        },
        {
          "run": "npx playwright install --with-deps chromium"
        },
        {
          "run": "npm run test:e2e --if-present"
        }
      ]
    }
  }
}
