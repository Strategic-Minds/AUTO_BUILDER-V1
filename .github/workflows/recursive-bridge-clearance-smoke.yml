name: Recursive Bridge Clearance Smoke

on:
  pull_request:
    paths:
      - "docs/bridges/recursive-clearance/**"
      - "src/app/api/bridge/**"
      - "scripts/validate-recursive-bridge-clearance.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-clearance-kit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate recursive bridge clearance contracts
        run: node scripts/validate-recursive-bridge-clearance.mjs
      - name: Verify unapproved mutation marker exists
        run: |
          grep -F "Unapproved Class 2+ action rejected" src/app/api/bridge/connectors/execute-approved/route.ts
          grep -F "BRIDGE_LIVE_MUTATION_ENABLED" src/app/api/bridge/connectors/execute-approved/route.ts
      - name: Print smoke handoff
        run: |
          echo "Preview route smoke still required after Vercel deploy:"
          echo "GET /api/bridge/registry"
          echo "GET /api/bridge/connectors/status"
          echo "POST /api/bridge/connectors/dry-run"
          echo "POST /api/bridge/connectors/execute-approved"
          echo "GET /api/bridge/unblock/scan"
