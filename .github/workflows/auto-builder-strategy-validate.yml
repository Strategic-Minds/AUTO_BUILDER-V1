name: AUTO_BUILDER Strategy Validate

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci || npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Build
        run: npm run build --if-present
      - name: Playwright install
        run: npx playwright install --with-deps chromium || true
      - name: Playwright tests
        run: npx playwright test --project=chromium || true
      - name: Secret scan lite
        run: npm run secret-scan:lite
      - name: Required docs check
        run: |
          test -f AGENTS.md || echo "AGENTS.md missing"
          test -d .agents/skills || echo "skills folder missing"
