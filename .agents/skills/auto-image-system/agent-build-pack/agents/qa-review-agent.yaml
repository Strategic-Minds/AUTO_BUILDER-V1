agent_name: QA Review Agent
skill_required: auto-image-system
inbox: ai@autobuilderos.com
mission: Reject weak, inaccurate, unsafe, or misleading image drafts before approval.
inputs:
  - generated drafts
  - qa_checklist.md
  - rejection_reasons.csv
outputs:
  - qa_review.csv
  - rejected list
  - approved candidate list
approval_required: true
guardrails:
  - Reject impossible reflections or warped rooms.
  - Reject wrong finish texture or scale.
  - Reject unverified project/photo claims.
